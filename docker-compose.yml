services:
  web:
    build: .
    environment:
      DATABASE_URL: file:./dev.db
      APP_BASE_URL: http://localhost:3000
      SESSION_SECRET: change_me_to_long_random_string
      ADMIN_DEFAULT_EMAIL: admin@howtorise.net
      ADMIN_DEFAULT_PASSWORD: ChangeMe123!
      ANALYTICS_RAW_RETENTION_DAYS: "90"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
